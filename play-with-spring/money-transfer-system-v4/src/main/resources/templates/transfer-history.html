<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>mts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

<div class="container">
    <h1 class="display-1">Money Transfer System</h1>
    <p>This is the home page of the MTS application.</p>
    <hr/>

    <nav class="nav">
        <a class="nav-link" href="/transfer">Transfer</a>
        <a class="nav-link" href="/transfer/history">Transfer-History</a>
    </nav>

    <hr/>

    <div class="row">
        <div class="col-6">
            <h2 class="display-2">Transfer Status</h2>
            <p class="lead">
                <span th:if="${response.status == 'success'}" class="text-success">Transfer successful!</span>
                <span th:if="${response.status == 'failure'}" class="text-danger">Transfer failed. Please try again.</span>
                <hr/>
                <span th:text="${response.message}"></span><br/>
                <hr/>
                <a href="/transfer" class="btn btn-primary">Make Another Transfer</a>
            </p>
        </div>
    </div>

</div>

</body>
</html>
