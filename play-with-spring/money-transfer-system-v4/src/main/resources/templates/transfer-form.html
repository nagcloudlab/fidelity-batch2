<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Fund Transfer')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar('transfer')}"></nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Fund Transfer</h4>
                </div>
                <div class="card-body">
                    <form action="/transfer" method="post" th:object="${transferRequest}">

                        <div class="mb-3">
                            <label for="senderAccountNumber" class="form-label">Sender Account Number</label>
                            <input type="text" class="form-control"
                                   id="senderAccountNumber"
                                   th:field="*{senderAccountNumber}"
                                   th:classappend="${#fields.hasErrors('senderAccountNumber')} ? 'is-invalid'"
                                   placeholder="Enter sender account number" required>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('senderAccountNumber')}"
                                 th:errors="*{senderAccountNumber}">Validation error</div>
                        </div>

                        <div class="mb-3">
                            <label for="beneficiaryAccountNumber" class="form-label">Beneficiary Account Number</label>
                            <input type="text" class="form-control"
                                   id="beneficiaryAccountNumber"
                                   th:field="*{beneficiaryAccountNumber}"
                                   th:classappend="${#fields.hasErrors('beneficiaryAccountNumber')} ? 'is-invalid'"
                                   placeholder="Enter beneficiary account number" required>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('beneficiaryAccountNumber')}"
                                 th:errors="*{beneficiaryAccountNumber}">Validation error</div>
                        </div>

                        <div class="mb-3">
                            <label for="amount" class="form-label">Amount</label>
                            <div class="input-group">
                                <span class="input-group-text">&#8377;</span>
                                <input type="number" step="0.01" min="0.01" class="form-control"
                                       id="amount"
                                       th:field="*{amount}"
                                       th:classappend="${#fields.hasErrors('amount')} ? 'is-invalid'"
                                       placeholder="0.00" required>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('amount')}"
                                     th:errors="*{amount}">Validation error</div>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Transfer</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
