<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} + ' | Money Transfer System'">Money Transfer System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
<nav th:fragment="navbar(activePage)" class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">MTS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'home'} ? 'active'" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'transfer'} ? 'active'" href="/transfer">Fund Transfer</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'history'} ? 'active'" href="/transfer/history">Transaction History</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="mt-5 py-3 bg-light text-center text-muted border-top">
    <div class="container">
        <small>Money Transfer System &copy; 2025 | Spring Boot Training</small>
    </div>
</footer>
</body>
</html>
