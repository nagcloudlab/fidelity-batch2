<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>mts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

<div class="container">
    <h1 class="display-1">Money Transfer System</h1>
    <p>This is the home page of the MTS application.</p>
    <hr/>

    <nav class="nav">
        <a class="nav-link" href="/transfer">Transfer</a>
        <a class="nav-link" href="/transfer/history">Transfer-History</a>
    </nav>

    <hr/>

    <div class="row">
        <div class="col-6">
            <h2 class="display-2">Transfer hiostory</h2>
            <p class="lead">
                <span th:if="${#lists.isEmpty(transactions)}" class="text-info">No transfer history available.</span>
                <span th:if="${!#lists.isEmpty(transactions)}">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th scope="col">Id</th>
                            <th scope="col">Account</th>
                            <th scope="col">Amount</th>
                            <th scope="col">Type</th>
                            <th scope="col">Time</th>
                            <th scope="col">Description</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="transaction : ${transactions}">
                            <th scope="row" th:text="${transaction.id}"></th>
                            <td th:text="${transaction.account.accountNumber}"></td>
                            <td th:text="${transaction.amount}"></td>
                            <td th:text="${transaction.type}"></td>
                            <td></td>
<!--                            <td th:text="${#dates.format(transaction.timestamp, 'yyyy-MM-dd HH:mm:ss')}"></td>-->
                            <td th:text="${transaction.description}"></td>
                        </tr>
                        </tbody>
                    </table>
                </span>
            </p>
        </div>
    </div>

</div>

</body>
</html>
